name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      # Corepack must provide pnpm before setup-node resolves the pnpm cache.
      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  native:
    name: Native checks
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Check formatting
        working-directory: apps/desktop/src-tauri
        run: cargo fmt --check

      - name: Prepare sidecar placeholder for Tauri validation
        working-directory: apps/desktop/src-tauri
        run: |
          mkdir -p binaries
          touch binaries/ziplyne-lens-api-aarch64-apple-darwin

      - name: Check native code
        working-directory: apps/desktop/src-tauri
        run: cargo check --locked

      - name: Lint native code
        working-directory: apps/desktop/src-tauri
        run: cargo clippy --locked --all-targets -- -D warnings
